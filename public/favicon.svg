<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="20" fill="#0A0A0A" />
  
  <!-- Subtle red glow -->
  <circle cx="50" cy="50" r="40" fill="#ff453a" opacity="0.15" filter="blur(10px)" />
  
  <!-- Terminal Prompt > -->
  <path d="M 35 25 L 65 50 L 35 75" fill="none" stroke="#ff453a" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Blinking Cursor -->
  <rect x="70" y="65" width="10" height="12" fill="#ff453a" />
</svg>
